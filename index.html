<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام إدارة المخزون الذكي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css"> 
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 400px;">
    <div class="card p-4 shadow-sm mt-5">
        <h3 class="text-center mb-4 text-primary">نظام إدارة المخزون</h3>
        
        <div class="alert alert-info text-center py-2" style="font-size: 0.9rem;">
            مرحباً بك! هذه نسخة تجريبية لواجهة النظام.
        </div>

        <form method="GET" action="dashboard.html">
            <div class="mb-3">
                <label class="form-label">اسم المستخدم</label>
                <input type="text" name="username" class="form-control" placeholder="أدخل اسم المستخدم (مثال: admin)" autocomplete="off" required>
            </div>
            <div class="mb-3">
                <label class="form-label">كلمة المرور</label>
                <input type="password" name="password" class="form-control" placeholder="أدخل كلمة المرور" required>
            </div>
            
            <div class="mb-3 text-muted" style="font-size: 0.8rem;">
                * اضغطي على "دخول" للانتقال للوحة التحكم (نسخة العرض).
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-2">دخول</button>
        </form>
    </div>
</div>

</body>
</html>
